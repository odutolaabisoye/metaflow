##############################################################################
# MetaFlow — Local Development Stack
#
# Usage:
#   docker compose up          # API + worker + postgres + redis
#   docker compose up api      # API only (postgres + redis started as deps)
#   docker compose logs -f api # Follow API logs
#
# Environment:
#   Copy backend/.env.example → backend/.env and fill in your values.
#   The DATABASE_URL and REDIS_URL below are pre-wired for the local services.
##############################################################################

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: metaflow
      POSTGRES_PASSWORD: metaflow
      POSTGRES_DB: metaflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # exposed for local GUI tools (TablePlus, etc.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"          # exposed for local inspection (RedisInsight, etc.)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override with local service addresses — takes precedence over .env
      DATABASE_URL: postgresql://metaflow:metaflow@postgres:5432/metaflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "4000:4000"
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Background Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://metaflow:metaflow@postgres:5432/metaflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      # Skip migrations — the API container already ran them at startup
      SKIP_MIGRATE: "true"
    command: ["node", "dist/worker.js"]

volumes:
  postgres_data:
  redis_data:
